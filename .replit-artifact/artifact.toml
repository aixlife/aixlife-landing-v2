kind = "web"
previewPath = "/"
title = "AIXLIFE Landing Page"
version = "1.0.0"
id = "artifacts/aixlife-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20024
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/aixlife-landing run dev"

[services.env]
PORT = "20024"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/aixlife-landing", "run", "build"]
publicDir = "artifacts/aixlife-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
